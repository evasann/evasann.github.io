<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
        background: #fafafa;
        color: #111;
        padding: 1rem;
      }

      p {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
        margin: 0 0 1rem;
      }

      img {
        max-width: 100%;
        height: auto;
        border-radius: 0.75rem;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
        width: min(600px, 100%);
      }

      @media (min-width: 640px) {
        body {
          padding: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <p>Hello World</p>
    <img src="knife-to-be1.jpg" alt="knife to be" />
  </body>
</html>
